name: Build Desktop D3D12 Samples

on:
  workflow_dispatch:
    inputs:
      configuration:
        description: MSBuild configuration to compile.
        required: true
        default: Release
        type: choice
        options:
          - Release
          - Debug
  push:
    branches:
      - main
      - master
    paths:
      - .github/workflows/msbuild.yml
      - Samples/Desktop/**
      - MiniEngine/**

permissions:
  contents: read

concurrency:
  group: desktop-d3d12-samples-${{ github.ref }}
  cancel-in-progress: true

env:
  BUILD_CONFIGURATION: ${{ github.event.inputs.configuration || 'Release' }}
  BUILD_PLATFORM: x64
  PLATFORM_TOOLSET: v143
  WINDOWS_SDK_VERSION: 10.0

jobs:
  build:
    name: ${{ matrix.name }}
    runs-on: windows-2022

    strategy:
      fail-fast: false
      matrix:
        include:
          # ---- Standalone Desktop samples ----
          - name: D3D1211On12
            project: Samples/Desktop/D3D1211On12/src/D3D1211On12.vcxproj
          - name: D3D12Bundles
            project: Samples/Desktop/D3D12Bundles/src/D3D12Bundles.vcxproj
          - name: D3D12DepthBoundsTest
            project: Samples/Desktop/D3D12DepthBoundsTest/src/D3D12DepthBoundsTest.vcxproj
          - name: D3D12DynamicIndexing
            project: Samples/Desktop/D3D12DynamicIndexing/src/D3D12DynamicIndexing.vcxproj
          - name: D3D12ExecuteIndirect
            project: Samples/Desktop/D3D12ExecuteIndirect/src/D3D12ExecuteIndirect.vcxproj
          - name: D3D12Fullscreen
            project: Samples/Desktop/D3D12Fullscreen/src/D3D12Fullscreen.vcxproj
          - name: D3D12HDR
            project: Samples/Desktop/D3D12HDR/src/D3D12HDR.vcxproj
          - name: D3D12HeterogeneousMultiadapter
            project: Samples/Desktop/D3D12HeterogeneousMultiadapter/src/D3D12HeterogeneousMultiadapter.vcxproj
          - name: D3D12Multithreading
            project: Samples/Desktop/D3D12Multithreading/src/D3D12Multithreading.vcxproj
          - name: D3D12On7
            project: Samples/Desktop/D3D12On7/src/D3D12On7.vcxproj
          - name: D3D12PipelineStateCache
            project: Samples/Desktop/D3D12PipelineStateCache/src/D3D12PipelineStateCache.vcxproj
          - name: D3D12PredicationQueries
            project: Samples/Desktop/D3D12PredicationQueries/src/D3D12PredicationQueries.vcxproj
          - name: D3D12ReservedResources
            project: Samples/Desktop/D3D12ReservedResources/src/D3D12ReservedResources.vcxproj
          - name: D3D12SmallResources
            project: Samples/Desktop/D3D12SmallResources/src/D3D12SmallResources.vcxproj
          - name: D3D12SM6WaveIntrinsics
            project: Samples/Desktop/D3D12SM6WaveIntrinsics/src/D3D12SM6WaveIntrinsics.vcxproj
          - name: D3D12StateObjectDatabase
            project: Samples/Desktop/D3D12StateObjectDatabase/src/StateObjectDatabase Sample.vcxproj
          - name: D3D12VariableRateShading
            project: Samples/Desktop/D3D12VariableRateShading/src/D3D12VariableRateShading.vcxproj
          - name: D3D12nBodyGravity
            project: Samples/Desktop/D3D12nBodyGravity/src/D3D12nBodyGravity.vcxproj
          - name: D3D12xGPU
            project: Samples/Desktop/D3D12xGPU/src/D3D12xGPU.vcxproj
          # NOTE: The following Desktop samples are intentionally not built in
          # CI because they depend on sources/headers that are not present in
          # this repository (e.g. external OMM SDK, the d3dx12Residency helper,
          # cross-project headers, or HLSL features like Shader Execution
          # Reordering that require Shader Model 6.9 which the project files
          # do not currently target):
          #   - D3D12OMMOfflineBaker  (missing 'omm.hpp')
          #   - D3D12Residency        (missing 'd3dx12Residency.h' on the include path)
          #   - D3D12RaytracingSakuraForestSER (HLSL needs SM 6.9 but project targets 6.3)
          #   - D3D12WavefrontConverter (missing 'D3D12MeshletGenerator.h')

          # ---- D3D12HelloWorld sub-samples ----
          - name: D3D12HelloBundles
            project: Samples/Desktop/D3D12HelloWorld/src/HelloBundles/D3D12HelloBundles.vcxproj
          - name: D3D12HelloConstBuffers
            project: Samples/Desktop/D3D12HelloWorld/src/HelloConstBuffers/D3D12HelloConstBuffers.vcxproj
          - name: D3D12HelloFrameBuffering
            project: Samples/Desktop/D3D12HelloWorld/src/HelloFrameBuffering/D3D12HelloFrameBuffering.vcxproj
          - name: D3D12HelloGenericPrograms
            project: Samples/Desktop/D3D12HelloWorld/src/HelloGenericPrograms/D3D12HelloGenericPrograms.vcxproj
          - name: D3D12HelloMeshNodes
            project: Samples/Desktop/D3D12HelloWorld/src/HelloMeshNodes/D3D12HelloMeshNodes.vcxproj
          - name: D3D12HelloPartialGraphicsPrograms
            project: Samples/Desktop/D3D12HelloWorld/src/HelloPartialGraphicsPrograms/D3D12HelloPartialGraphicsPrograms.vcxproj
          - name: D3D12HelloTexture
            project: Samples/Desktop/D3D12HelloWorld/src/HelloTexture/D3D12HelloTexture.vcxproj
          - name: D3D12HelloTightAlignment
            project: Samples/Desktop/D3D12HelloWorld/src/HelloTightAlignment/D3D12HelloTightAlignment.vcxproj
          - name: D3D12HelloTriangle
            project: Samples/Desktop/D3D12HelloWorld/src/HelloTriangle/D3D12HelloTriangle.vcxproj
          - name: D3D12HelloVADecode
            project: Samples/Desktop/D3D12HelloWorld/src/HelloVADecode/D3D12HelloVADecode.vcxproj
          - name: D3D12HelloVAEncode
            project: Samples/Desktop/D3D12HelloWorld/src/HelloVAEncode/D3D12HelloVAEncode.vcxproj
          - name: D3D12HelloVAResourceInterop
            project: Samples/Desktop/D3D12HelloWorld/src/HelloVAResourceInterop/D3D12HelloVAResourceInterop.vcxproj
          - name: D3D12HelloWindow
            project: Samples/Desktop/D3D12HelloWorld/src/HelloWindow/D3D12HelloWindow.vcxproj
          - name: D3D12HelloWorkGraphs
            project: Samples/Desktop/D3D12HelloWorld/src/HelloWorkGraphs/D3D12HelloWorkGraphs.vcxproj
          - name: D3D12WorkGraphsSandbox
            project: Samples/Desktop/D3D12HelloWorld/src/WorkGraphsSandbox/D3D12WorkGraphsSandbox.vcxproj

          # ---- D3D12LinkedGpus sub-samples ----
          - name: D3D12LinkedGpus
            project: Samples/Desktop/D3D12LinkedGpus/src/LinkedGpus/D3D12LinkedGpus.vcxproj
          - name: D3D12LinkedGpusAffinity
            project: Samples/Desktop/D3D12LinkedGpus/src/LinkedGpusAffinity/D3D12LinkedGpusAffinity.vcxproj
          - name: D3D12SingleGpu
            project: Samples/Desktop/D3D12LinkedGpus/src/SingleGpu/D3D12SingleGpu.vcxproj

          # ---- D3D12MeshShaders sub-samples ----
          - name: D3D12DynamicLOD
            project: Samples/Desktop/D3D12MeshShaders/src/DynamicLOD/D3D12DynamicLOD.vcxproj
          - name: D3D12MeshletCull
            project: Samples/Desktop/D3D12MeshShaders/src/MeshletCull/D3D12MeshletCull.vcxproj
          - name: D3D12MeshletGenerator
            project: Samples/Desktop/D3D12MeshShaders/src/MeshletGenerator/D3D12MeshletGenerator.vcxproj
          - name: D3D12MeshletInstancing
            project: Samples/Desktop/D3D12MeshShaders/src/MeshletInstancing/D3D12MeshletInstancing.vcxproj
          - name: D3D12MeshletRender
            project: Samples/Desktop/D3D12MeshShaders/src/MeshletRender/D3D12MeshletRender.vcxproj

          # ---- D3D12Raytracing sub-samples ----
          - name: D3D12RaytracingHelloShaderExecutionReordering
            project: Samples/Desktop/D3D12Raytracing/src/D3D12RaytracingHelloShaderExecutionReordering/D3D12RaytracingHelloShaderExecutionReordering.vcxproj
          - name: D3D12RaytracingHelloWorld
            project: Samples/Desktop/D3D12Raytracing/src/D3D12RaytracingHelloWorld/D3D12RaytracingHelloWorld.vcxproj
          - name: D3D12RaytracingLibrarySubobjects
            project: Samples/Desktop/D3D12Raytracing/src/D3D12RaytracingLibrarySubobjects/D3D12RaytracingLibrarySubobjects.vcxproj
          - name: D3D12RaytracingMiniEngineSample
            project: Samples/Desktop/D3D12Raytracing/src/D3D12RaytracingMiniEngineSample/ModelViewer_VS16.vcxproj
            # Pulls in MiniEngine sub-projects whose vcxproj files reference
            # NuGet packages from the repo-root `Packages\` folder. Restore
            # those packages.config files too so MSBuild can find the props.
            extraPackagesConfigs: |
              MiniEngine/Core/packages.config
              MiniEngine/Model/packages.config
          - name: D3D12RaytracingOpacityMicromaps
            project: Samples/Desktop/D3D12Raytracing/src/D3D12RaytracingOpacityMicromaps/D3D12RaytracingOpacityMicromaps.vcxproj
          - name: D3D12RaytracingProceduralGeometry
            project: Samples/Desktop/D3D12Raytracing/src/D3D12RaytracingProceduralGeometry/D3D12RaytracingProceduralGeometry.vcxproj
          - name: D3D12RaytracingRealTimeDenoisedAmbientOcclusion
            project: Samples/Desktop/D3D12Raytracing/src/D3D12RaytracingRealTimeDenoisedAmbientOcclusion/D3D12RaytracingRealTimeDenoisedAmbientOcclusion.vcxproj
          - name: D3D12RaytracingSimpleLighting
            project: Samples/Desktop/D3D12Raytracing/src/D3D12RaytracingSimpleLighting/D3D12RaytracingSimpleLighting.vcxproj

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Setup NuGet
        uses: NuGet/setup-nuget@v2

      - name: Show build environment
        shell: pwsh
        run: |
          where.exe msbuild
          msbuild -version
          Get-ChildItem "C:\Program Files (x86)\Windows Kits\10\Include" |
            Sort-Object Name -Descending |
            Select-Object -First 5 -ExpandProperty Name

      - name: Detect packages directory
        id: detect
        shell: pwsh
        run: |
          $project = "${{ matrix.project }}"
          if (-not (Test-Path $project)) {
            throw "Project file was not found: $project"
          }
          $projDir = Split-Path -Parent $project
          $content = Get-Content $project -Raw

          # Some projects use `packages\...`, some use `..\packages\...`,
          # some use `.\packages\...`, and the Raytracing samples use
          # `..\..\..\..\..\Packages\...` (note the capital "P", which lives
          # at the repository root). Pick up the relative prefix from the
          # very first matching Import in the vcxproj so NuGet restores into
          # the exact directory the project will look for.
          $relPrefix = "packages"
          $match = [regex]::Match(
            $content,
            'Import\s+Project\s*=\s*"((?:\.[\\/])?(?:\.\.[\\/])*[Pp]ackages)[\\/]')
          if ($match.Success) {
            $relPrefix = $match.Groups[1].Value
          }

          $packagesDir = (Join-Path $projDir $relPrefix)
          # Resolve to a canonical path (creating it first so Resolve-Path works).
          New-Item -ItemType Directory -Force -Path $packagesDir | Out-Null
          $packagesDirAbs = (Resolve-Path $packagesDir).Path

          $packagesConfig = Join-Path $projDir "packages.config"
          $hasConfig = (Test-Path $packagesConfig).ToString().ToLower()

          Write-Host "Project       : $project"
          Write-Host "ProjectDir    : $projDir"
          Write-Host "RelPrefix     : $relPrefix"
          Write-Host "PackagesDir   : $packagesDirAbs"
          Write-Host "PackagesConfig: $packagesConfig (exists=$hasConfig)"

          "projectDir=$projDir"          | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "packagesDir=$packagesDirAbs"  | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "packagesConfig=$packagesConfig" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "hasConfig=$hasConfig"         | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Restore NuGet packages
        if: steps.detect.outputs.hasConfig == 'true'
        shell: pwsh
        run: |
          nuget restore "${{ steps.detect.outputs.packagesConfig }}" `
            -PackagesDirectory "${{ steps.detect.outputs.packagesDir }}" `
            -NonInteractive `
            -Verbosity normal

      - name: Restore extra NuGet packages
        if: ${{ matrix.extraPackagesConfigs != '' }}
        shell: pwsh
        run: |
          # Some samples (e.g. the MiniEngine-based ones) pull in sibling
          # projects that import NuGet props from the repo-root `Packages\`
          # directory. Restore those too so MSBuild can find them.
          $repoRoot = (Resolve-Path ".").Path
          $repoPackagesDir = Join-Path $repoRoot "Packages"
          New-Item -ItemType Directory -Force -Path $repoPackagesDir | Out-Null

          $extras = @"
          ${{ matrix.extraPackagesConfigs }}
          "@
          foreach ($line in $extras -split "`n") {
            $cfg = $line.Trim()
            if (-not $cfg) { continue }
            if (-not (Test-Path $cfg)) {
              Write-Host "Skipping missing extra packages.config: $cfg"
              continue
            }
            Write-Host "Restoring extra: $cfg -> $repoPackagesDir"
            nuget restore $cfg `
              -PackagesDirectory $repoPackagesDir `
              -NonInteractive `
              -Verbosity normal
          }

      - name: Add NuGet DXC to PATH
        if: steps.detect.outputs.hasConfig == 'true'
        shell: pwsh
        run: |
          $packagesDir = "${{ steps.detect.outputs.packagesDir }}"
          if (-not (Test-Path $packagesDir)) {
            Write-Host "No packages directory at $packagesDir; skipping DXC discovery."
            return
          }
          $dxc = Get-ChildItem $packagesDir -Recurse -Filter dxc.exe -ErrorAction SilentlyContinue |
            Where-Object { $_.FullName -match '\\bin\\x64\\' } |
            Select-Object -First 1
          if ($null -eq $dxc) {
            Write-Host "x64 dxc.exe was not found under $packagesDir; this sample may not need DXC."
            return
          }
          Write-Host "Using DXC: $($dxc.FullName)"
          $dxc.DirectoryName | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          & $dxc.FullName -help | Select-Object -First 1

      - name: Build
        shell: pwsh
        run: |
          msbuild "${{ matrix.project }}" `
            /m `
            /t:Build `
            /p:Configuration="$env:BUILD_CONFIGURATION" `
            /p:Platform="$env:BUILD_PLATFORM" `
            /p:PlatformToolset="$env:PLATFORM_TOOLSET" `
            /p:WindowsTargetPlatformVersion="$env:WINDOWS_SDK_VERSION" `
            /p:PreferredToolArchitecture=x64 `
            /v:minimal

      - name: Stage artifact
        shell: pwsh
        run: |
          $projDir = "${{ steps.detect.outputs.projectDir }}"
          $cfg     = $env:BUILD_CONFIGURATION
          $plat    = $env:BUILD_PLATFORM

          # Different vcxproj files use different OutDir conventions. Try the
          # most common ones in order, then fall back to a recursive search
          # for a freshly produced binary under the project directory.
          $candidates = @(
            (Join-Path $projDir "bin/$plat/$cfg"),
            (Join-Path $projDir "bin/$cfg"),
            (Join-Path (Split-Path -Parent $projDir) "bin/$plat/$cfg"),
            (Join-Path (Split-Path -Parent $projDir) "bin/$cfg")
          )

          $outDir = $null
          foreach ($c in $candidates) {
            if (Test-Path $c) {
              $outDir = $c
              break
            }
          }

          if (-not $outDir) {
            # Last-resort: pick the directory that contains the most recently
            # built .exe / .dll under the project tree.
            $bin = Get-ChildItem $projDir -Recurse -Include *.exe,*.dll -ErrorAction SilentlyContinue |
              Sort-Object LastWriteTime -Descending |
              Select-Object -First 1
            if ($bin) {
              $outDir = $bin.DirectoryName
            }
          }

          if (-not $outDir) {
            $tried = ($candidates -join "`n  ")
            throw "Build output directory was not found. Tried:`n  $tried"
          }
          Write-Host "Using build output: $outDir"

          $stage = Join-Path $env:RUNNER_TEMP "desktop-d3d12-${{ matrix.name }}"
          New-Item -ItemType Directory -Force -Path $stage | Out-Null
          Copy-Item -Path (Join-Path $outDir "*") -Destination $stage -Recurse -Force

          Get-ChildItem $stage -Recurse |
            Select-Object FullName, Length |
            Format-Table -AutoSize

      - name: Upload per-sample artifact
        uses: actions/upload-artifact@v4
        with:
          name: desktop-d3d12-${{ matrix.name }}-${{ env.BUILD_PLATFORM }}-${{ env.BUILD_CONFIGURATION }}
          path: ${{ runner.temp }}/desktop-d3d12-${{ matrix.name }}
          if-no-files-found: error
          retention-days: 14

  package-all:
    name: Package all samples
    needs: build
    if: ${{ always() }}
    runs-on: ubuntu-latest
    steps:
      - name: Download all per-sample artifacts
        uses: actions/download-artifact@v4
        with:
          path: all-samples
          pattern: desktop-d3d12-*

      - name: Show downloaded layout
        shell: bash
        run: |
          set -euo pipefail
          echo "Downloaded artifacts:"
          ls -la all-samples || true
          find all-samples -maxdepth 3 -type d | sort

      - name: Upload combined artifact
        uses: actions/upload-artifact@v4
        with:
          name: desktop-d3d12-all-${{ env.BUILD_PLATFORM }}-${{ env.BUILD_CONFIGURATION }}
          path: all-samples
          if-no-files-found: error
          retention-days: 14
